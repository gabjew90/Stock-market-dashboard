name: ci

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Sync deps
        run: uv sync --frozen
      - name: Pytest
        run: uv run pytest -q
      - name: Wiki lint
        run: uv run ww lint .
