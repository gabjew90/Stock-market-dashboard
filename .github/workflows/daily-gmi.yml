name: daily-gmi

# Rebuild the GMI playground every weekday after the US market close and publish to GitHub Pages.
# Three cron times so today's data still lands even if GitHub Actions delays the primary slot
# (we observed 55-min slippage on 2026-05-15 and a complete miss on 2026-05-19 — scheduled
# workflows can be queued behind interactive jobs for hours during peak load). The build is
# idempotent: when a later cron fires after an earlier one already deployed today's data, it
# simply rebuilds and redeploys the same numbers — harmless. When it fires AFTER a missed
# primary, it's the lifeline that gets today's bar on the site by ~9 PM ET.
on:
  schedule:
    - cron: '0 22 * * 1-5'    # 22:00 UTC weekday — primary (≈ 6 PM ET EDT / 5 PM EST)
    - cron: '30 23 * * 1-5'   # 23:30 UTC weekday — backup (~90 min after primary)
    - cron: '0 1 * * 2-6'     # 01:00 UTC Tue-Sat  — emergency (≈ 9 PM Mon-Fri ET; UTC day shifts +1)
  workflow_dispatch:   # also allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/build_gmi_playground.py'
      - 'scripts/build_wiki_html.py'
      - '.github/workflows/daily-gmi.yml'
      - 'src/ww/backtest/**'
      - 'wiki/**'
      - 'raw/posts.jsonl'
      - 'web/pulse.html'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen

      # Persist the (slow-to-build) breadth panel + OHLC cache across runs.
      # First run takes ~5 min to fetch the full Nasdaq Trader universe;
      # subsequent runs hit the cache and do a delta-update in seconds.
      - name: Restore breadth + OHLC cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            data/breadth
            data/backtest
          key: breadth-cache-v1-${{ github.run_id }}
          restore-keys: |
            breadth-cache-v1-

      - name: Bootstrap breadth (only when cache is empty)
        if: ${{ hashFiles('data/breadth/universe.parquet') == '' }}
        run: |
          uv run ww breadth fetch
          uv run ww breadth build
        env:
          PYTHONUNBUFFERED: '1'

      - name: Incremental breadth update
        if: ${{ hashFiles('data/breadth/universe.parquet') != '' }}
        run: uv run ww breadth update
        env:
          PYTHONUNBUFFERED: '1'

      - name: Rebuild GMI playground HTML
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/build_gmi_playground.py 2>&1 | tee build_gmi.log

      - name: Upload build log (every run, success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-gmi-log
          path: build_gmi.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Rebuild wiki HTML
        run: uv run --with markdown --with pygments python scripts/build_wiki_html.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp gmi_playground_daily.html _site/index.html
          cp gmi_playground_daily.html _site/gmi.html
          cp wiki_site.html _site/wiki.html
          # Copy any image/data assets referenced by the wiki (e.g. backtest equity curve)
          if [ -d assets ]; then cp -r assets _site/assets; fi
          # Daily Pulse page. Static HTML that fetches the latest pulse
          # fragment at runtime from the Institutional-report-bot repo's
          # pulse-data branch, so the pulse on this page is always the
          # most recent one regardless of when this workflow last ran.
          # See PULSE-INTEGRATION.md at the repo root for architecture.
          mkdir -p _site/pulse
          cp web/pulse.html _site/pulse/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
