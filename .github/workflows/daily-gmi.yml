name: daily-gmi

# Rebuild the GMI playground every weekday after the US market close and publish to GitHub Pages.
on:
  schedule:
    # 22:00 UTC weekdays  ≈ 5–6pm ET (after the close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # also allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/build_gmi_playground.py'
      - 'scripts/build_wiki_html.py'
      - '.github/workflows/daily-gmi.yml'
      - 'src/ww/backtest/**'
      - 'wiki/**'
      - 'raw/posts.jsonl'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen

      # Persist the (slow-to-build) breadth panel + OHLC cache across runs.
      # First run takes ~5 min to fetch the full Nasdaq Trader universe;
      # subsequent runs hit the cache and do a delta-update in seconds.
      - name: Restore breadth + OHLC cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            data/breadth
            data/backtest
          key: breadth-cache-v1-${{ github.run_id }}
          restore-keys: |
            breadth-cache-v1-

      - name: Bootstrap breadth (only when cache is empty)
        if: ${{ hashFiles('data/breadth/universe.parquet') == '' }}
        run: |
          uv run ww breadth fetch
          uv run ww breadth build
        env:
          PYTHONUNBUFFERED: '1'

      - name: Incremental breadth update
        if: ${{ hashFiles('data/breadth/universe.parquet') != '' }}
        run: uv run ww breadth update
        env:
          PYTHONUNBUFFERED: '1'

      - name: Rebuild GMI playground HTML
        run: uv run python scripts/build_gmi_playground.py

      - name: Rebuild wiki HTML
        run: uv run --with markdown --with pygments python scripts/build_wiki_html.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp gmi_playground_daily.html _site/index.html
          cp gmi_playground_daily.html _site/gmi.html
          cp wiki_site.html _site/wiki.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
