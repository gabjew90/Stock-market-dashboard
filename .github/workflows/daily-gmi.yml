name: daily-gmi

# Rebuild the GMI playground every weekday after the US market close and publish to GitHub Pages.
# Three cron times so today's data still lands even if GitHub Actions delays the primary slot
# (we observed 55-min slippage on 2026-05-15 and a complete miss on 2026-05-19 — scheduled
# workflows can be queued behind interactive jobs for hours during peak load). The build is
# idempotent: when a later cron fires after an earlier one already deployed today's data, it
# simply rebuilds and redeploys the same numbers — harmless. When it fires AFTER a missed
# primary, it's the lifeline that gets today's bar on the site by ~9 PM ET.
on:
  schedule:
    - cron: '0 22 * * 1-5'    # 22:00 UTC weekday — primary (≈ 6 PM ET EDT / 5 PM EST)
    - cron: '30 23 * * 1-5'   # 23:30 UTC weekday — backup (~90 min after primary)
    - cron: '0 1 * * 2-6'     # 01:00 UTC Tue-Sat  — emergency (≈ 9 PM Mon-Fri ET; UTC day shifts +1)
  workflow_dispatch:   # also allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/build_gmi_playground.py'
      - 'scripts/build_wiki_html.py'
      - '.github/workflows/daily-gmi.yml'
      - 'src/ww/backtest/**'
      - 'wiki/**'
      - 'raw/posts.jsonl'
      - 'web/pulse.html'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Cancel-in-progress so the LATEST push always wins the queue. Previously
  # this was false, which meant rapid-fire pushes stacked up — each waited
  # for the prior 5-minute build to finish, and the newest commit sat at
  # the back of the queue for 20+ minutes. With true, an in-flight build is
  # cancelled the moment a newer push lands, and the runner re-checks out
  # the newest SHA. The scheduled cron runs still get a clean queue at
  # 22:00, 23:30, and 01:00 UTC because no push triggers in between.
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Sync deps
        run: uv sync --frozen

      # Persist the (slow-to-build) breadth panel + OHLC cache across runs.
      # First run takes ~5 min to fetch the full Nasdaq Trader universe;
      # subsequent runs hit the cache and do a delta-update in seconds.
      - name: Restore breadth + OHLC cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            data/breadth
            data/backtest
          key: breadth-cache-v2-${{ github.run_id }}
          restore-keys: |
            breadth-cache-v2-

      - name: Bootstrap breadth (only when cache is empty)
        if: ${{ hashFiles('data/breadth/universe.parquet') == '' }}
        shell: bash
        run: |
          set -o pipefail
          uv run ww breadth fetch 2>&1 | tee -a breadth_update.log
          uv run ww breadth build 2>&1 | tee -a breadth_update.log
        env:
          PYTHONUNBUFFERED: '1'

      - name: Incremental breadth update
        if: ${{ hashFiles('data/breadth/universe.parquet') != '' }}
        shell: bash
        run: |
          set -o pipefail
          uv run ww breadth update 2>&1 | tee -a breadth_update.log
        env:
          PYTHONUNBUFFERED: '1'

      # Soft freshness guardrail: WARN aggressively, only HARD-FAIL on the data
      # quality signals that actually break the dashboard (recent zero-T2108 =
      # upstream price-fetch failure, the exact bug this check was added for).
      # The age threshold is loose (10 days) because the daily-gmi workflow now
      # triggers on every push to scripts/wiki/web paths — if you push at 11pm
      # on a Friday before a 3-day weekend, the deploy must still go through.
      - name: Verify breadth freshness
        shell: bash
        run: |
          uv run python -c "
          import pandas as pd, sys
          bs = pd.read_parquet('data/breadth/breadth_series.parquet')
          last = pd.to_datetime(bs['date']).max()
          today_et = pd.Timestamp.now(tz='America/New_York').normalize().tz_localize(None)
          age = (today_et - last).days
          print(f'breadth_series last date: {last.date()}  (age: {age}d)')
          tail_t = bs.tail(5)[['date','t2108_nyse','n_nyse']]
          print('last 5 T2108 readings:')
          print(tail_t.to_string(index=False))
          # WARN on age > 3, only FAIL on age > 10 (covers any reasonable
          # holiday window + 1-2 days of yfinance flakiness)
          if age > 10:
              print(f'::error::breadth data is {age} days stale (>10) — aborting deploy', flush=True)
              sys.exit(1)
          if age > 3:
              print(f'::warning::breadth data is {age} days stale — deploy proceeding but investigate', flush=True)
          # Hard-fail on recent zero T2108 (the bug this guardrail was actually added for)
          recent_zero = (tail_t['t2108_nyse'] == 0).sum()
          if recent_zero > 0:
              print(f'::error::{recent_zero}/5 of the latest T2108 readings are 0 — upstream fetch failure', flush=True)
              sys.exit(1)
          "

      - name: Upload breadth update log (every run, success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breadth-update-log
          path: breadth_update.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Rebuild GMI playground HTML
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/build_gmi_playground.py 2>&1 | tee build_gmi.log

      - name: Upload build log (every run, success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-gmi-log
          path: build_gmi.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Rebuild wiki HTML
        run: uv run --with markdown --with pygments python scripts/build_wiki_html.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp gmi_playground_daily.html _site/index.html
          cp gmi_playground_daily.html _site/gmi.html
          cp wiki_site.html _site/wiki.html
          # Copy any image/data assets referenced by the wiki (e.g. backtest equity curve)
          if [ -d assets ]; then cp -r assets _site/assets; fi
          # Daily Pulse page. Static HTML that fetches the latest pulse
          # fragment at runtime from the Institutional-report-bot repo's
          # pulse-data branch, so the pulse on this page is always the
          # most recent one regardless of when this workflow last ran.
          # See PULSE-INTEGRATION.md at the repo root for architecture.
          mkdir -p _site/pulse
          cp web/pulse.html _site/pulse/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
